<!DOCTYPE html>
<html>
<head>
    <title>Manage Bookings</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container" style="max-width: 700px;">
    <h2 class="mb-4 text-primary"> Manage Bookings</h2>

    <!-- Back to Admin Dashboard -->
    <a href="/admin" class="btn btn-secondary mb-4 w-100"> Back to Admin Dashboard</a>

    {% if bookings %}
        {% for b in bookings %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <p><strong>Vehicle:</strong> {{ b.vehicle.vehicle_no }}</p>
                <p><strong>Service:</strong> {{ b.service_type }}</p>
                <form method="POST" class="row g-3 align-items-center">
                    <input type="hidden" name="booking_id" value="{{ b.id }}">

                    <div class="col-md-5">
                        <select name="mechanic_id" class="form-select" required>
                            <option value="">Assign Mechanic</option>
                            {% for m in mechanics %}
                            <option value="{{ m.id }}" {% if b.mechanic_id == m.id %}selected{% endif %}>
                                {{ m.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <select name="status" class="form-select" required>
                            <option {% if b.status=='Pending' %}selected{% endif %}>Pending</option>
                            <option {% if b.status=='In Progress' %}selected{% endif %}>In Progress</option>
                            <option {% if b.status=='Completed' %}selected{% endif %}>Completed</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100"> Update</button>
                    </div>
                    
                   
                </form>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p class="text-muted">No bookings found.</p>
    {% endif %}
</div>

</body>
</html>
