<!DOCTYPE html>
<html>
<head>
    <title>Vehicles</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container" style="max-width: 600px;">
    <h2 class="mb-4 text-primary"> Vehicles</h2>

    <!-- Back to Admin Dashboard -->
    <a href="/admin" class="btn btn-secondary mb-4 w-100"> Back to Admin Dashboard</a>

    <!-- List of Vehicles -->
    {% if vehicles %}
        {% for v in vehicles %}
        <div class="card mb-2 shadow-sm">
            <div class="card-body">
                <p class="mb-0"><strong>{{ v.vehicle_no }}</strong> - {{ v.customer_name }}</p>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p class="text-muted">No vehicles added yet.</p>
    {% endif %}
</div>

</body>
</html>
