<!DOCTYPE html>
<html>
<head>
    <title>Add Booking</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container" style="max-width: 600px;">
    <h2 class="mb-4 text-primary"> Add Booking</h2>

    <form method="POST">
        <div class="mb-3">
            <input name="customer_name" class="form-control" placeholder="Customer Name" required>
        </div>
        <div class="mb-3">
            <input name="vehicle_no" class="form-control" placeholder="Vehicle No" required>
        </div>
        <div class="mb-3">
            <input name="model" class="form-control" placeholder="Model" required>
        </div>
        <div class="mb-3">
            <input name="brand" class="form-control" placeholder="Brand" required>
        </div>
        <div class="mb-3">
            <input name="year" class="form-control" placeholder="Year" required>
        </div>
        <div class="mb-3">
            <input name="service_type" class="form-control" placeholder="Service Type" required>
        </div>
        <div class="mb-3">
            <textarea name="problem" class="form-control" placeholder="Problem" required></textarea>
        </div>
        <br>
        <hr>
         <div class="mb-3">
            <input name="customer_name1" class="form-control" placeholder="Customer Name" required>
        </div>
        <div class="mb-3">
            <input name="vehicle_no1" class="form-control" placeholder="Vehicle No" required>
        </div>
        <div class="mb-3">
            <input name="model1" class="form-control" placeholder="Model" required>
        </div>
        <div class="mb-3">
            <input name="brand1" class="form-control" placeholder="Brand" required>
        </div>
        <div class="mb-3">
            <input name="year1" class="form-control" placeholder="Year" required>
        </div>
        <div class="mb-3">
            <input name="service_type1" class="form-control" placeholder="Service Type" required>
        </div>
        <div class="mb-3">
            <textarea name="problem1" class="form-control" placeholder="Problem" required></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100 mb-3"> Book</button>
    </form>

    <!-- Back to Dashboard Button -->
    <a href="/user" class="btn btn-secondary w-100"> Back to Dashboard</a>
</div>

</body>
</html>
